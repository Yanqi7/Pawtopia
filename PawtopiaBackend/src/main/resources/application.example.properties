spring.application.name=PawtopiaBackend

# MySQL database (override the default local H2 database)
spring.datasource.url=jdbc:mysql://localhost:3306/pawtopia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=YOUR_DB_USERNAME
spring.datasource.password=YOUR_DB_PASSWORD

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT (replace with strong secret in production)
app.jwt.secret=CHANGE_ME_PAWTOPIA_JWT_SECRET_64_CHARS_MINIMUM_0123456789abcdef
app.jwt.expMinutes=10080

# Seed data (recommended off for real use)
app.seed.enabled=false
app.seed.on-h2=false

# Storage
app.storage.upload-dir=uploads
app.storage.public-base-path=/uploads
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
