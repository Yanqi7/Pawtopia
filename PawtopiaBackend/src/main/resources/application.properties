spring.application.name=PawtopiaBackend

# MySQL database
spring.datasource.url=jdbc:mysql://localhost:3306/pawtopia?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server
server.port=8080

# JWT (replace with strong secret in production)
app.jwt.secret=CHANGE_ME_PAWTOPIA_JWT_SECRET_64_CHARS_MINIMUM_0123456789abcdef
app.jwt.expMinutes=10080

# Seed data (includes admin user1/user1)
app.seed.enabled=true
