spring.application.name=PawtopiaBackend

# Database
# 默认使用本地 H2 文件库，方便直接启动；如需 MySQL，请设置 DB_URL/DB_USERNAME/DB_PASSWORD 环境变量
spring.datasource.url=${DB_URL:jdbc:h2:file:./data/pawtopia;MODE=MySQL;AUTO_SERVER=TRUE;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=USER,ORDER}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=8080

# JWT (replace with strong secret in production)
app.jwt.secret=CHANGE_ME_PAWTOPIA_JWT_SECRET_64_CHARS_MINIMUM_0123456789abcdef
app.jwt.expMinutes=10080

# Seed data
# H2 本地库默认会 seed；如需在其他数据库中显式导入演示数据，请设置 APP_SEED_ENABLED=true
app.seed.enabled=${APP_SEED_ENABLED:false}
